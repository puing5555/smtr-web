<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>왜지 - 리다이렉트</title>
  <script>
    // GitHub Pages SPA fallback
    // Redirect unknown routes to the main page
    var basePath = '/invest-sns';
    var path = window.location.pathname;
    if (path.startsWith(basePath)) {
      // Try to navigate to the path via client-side routing
      sessionStorage.setItem('redirect', path.slice(basePath.length) + window.location.search + window.location.hash);
    }
    window.location.replace(basePath + '/');
  </script>
</head>
<body>
  <p>리다이렉트 중...</p>
</body>
</html>
